naftiko: 1.0.0-alpha2
info:
  label: OpenF1 API
  description: OpenF1 is a free and open-source API providing real-time and historical Formula 1 data including car telemetry,
    lap timing, race control, weather, pit stops, team radio, and championship standings.
  tags:
  - Openf1
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: openf1
    baseUri: https://api.openf1.org/v1
    description: OpenF1 API HTTP API.
    resources:
    - name: sessions
      path: /sessions
      operations:
      - name: listsessions
        method: GET
        description: List F1 sessions
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: meeting_key
          in: query
          type: integer
        - name: year
          in: query
          type: integer
        - name: country_name
          in: query
          type: string
        - name: session_type
          in: query
          type: string
        - name: session_name
          in: query
          type: string
        - name: circuit_short_name
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: meetings
      path: /meetings
      operations:
      - name: listmeetings
        method: GET
        description: List Grand Prix meetings
        inputParameters:
        - name: meeting_key
          in: query
          type: integer
        - name: year
          in: query
          type: integer
        - name: country_name
          in: query
          type: string
        - name: circuit_short_name
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: drivers
      path: /drivers
      operations:
      - name: listdrivers
        method: GET
        description: List drivers for a session
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: meeting_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        - name: team_name
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: laps
      path: /laps
      operations:
      - name: listlaps
        method: GET
        description: List laps with sector and speed-trap times
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        - name: lap_number
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: car-data
      path: /car_data
      operations:
      - name: getcardata
        method: GET
        description: High-frequency car telemetry (RPM, throttle, brake, gear, speed, DRS)
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        - name: speed
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: location
      path: /location
      operations:
      - name: getlocation
        method: GET
        description: Three-dimensional car location on track
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: position
      path: /position
      operations:
      - name: getposition
        method: GET
        description: Driver running order during a session
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        - name: position
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: intervals
      path: /intervals
      operations:
      - name: getintervals
        method: GET
        description: Real-time intervals between drivers (race only)
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pit
      path: /pit
      operations:
      - name: listpitstops
        method: GET
        description: List pit-lane events
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stints
      path: /stints
      operations:
      - name: liststints
        method: GET
        description: List tyre stints with compound and age
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: weather
      path: /weather
      operations:
      - name: getweather
        method: GET
        description: Track weather conditions during a session
        inputParameters:
        - name: session_key
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: race-control
      path: /race_control
      operations:
      - name: listracecontrol
        method: GET
        description: Race control messages, flags, and incidents
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        - name: category
          in: query
          type: string
        - name: flag
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: team-radio
      path: /team_radio
      operations:
      - name: listteamradio
        method: GET
        description: List team radio recordings
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
