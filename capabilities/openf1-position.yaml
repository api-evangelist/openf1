naftiko: 1.0.0-alpha2
info:
  label: OpenF1 API — Position
  description: 'OpenF1 API — Position. 2 operations. Lead operation: Real-time intervals between drivers (race only). Self-contained
    Naftiko capability covering one Openf1 business surface.'
  tags:
  - Openf1
  - Position
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENF1_API_KEY: OPENF1_API_KEY
capability:
  consumes:
  - type: http
    namespace: openf1-position
    baseUri: https://api.openf1.org/v1
    description: OpenF1 API — Position business capability. Self-contained, no shared references.
    resources:
    - name: intervals
      path: /intervals
      operations:
      - name: getintervals
        method: GET
        description: Real-time intervals between drivers (race only)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
    - name: position
      path: /position
      operations:
      - name: getposition
        method: GET
        description: Driver running order during a session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        - name: position
          in: query
          type: integer
  exposes:
  - type: rest
    namespace: openf1-position-rest
    port: 8080
    description: REST adapter for OpenF1 API — Position. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/intervals
      name: intervals
      description: REST surface for intervals.
      operations:
      - method: GET
        name: getintervals
        description: Real-time intervals between drivers (race only)
        call: openf1-position.getintervals
        with:
          session_key: rest.session_key
          driver_number: rest.driver_number
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/position
      name: position
      description: REST surface for position.
      operations:
      - method: GET
        name: getposition
        description: Driver running order during a session
        call: openf1-position.getposition
        with:
          session_key: rest.session_key
          driver_number: rest.driver_number
          position: rest.position
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openf1-position-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenF1 API — Position. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: real-time-intervals-between-drivers
      description: Real-time intervals between drivers (race only)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openf1-position.getintervals
      with:
        session_key: tools.session_key
        driver_number: tools.driver_number
      outputParameters:
      - type: object
        mapping: $.
    - name: driver-running-order-during-session
      description: Driver running order during a session
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openf1-position.getposition
      with:
        session_key: tools.session_key
        driver_number: tools.driver_number
        position: tools.position
      outputParameters:
      - type: object
        mapping: $.
