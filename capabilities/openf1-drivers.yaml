naftiko: 1.0.0-alpha2
info:
  label: OpenF1 API — Drivers
  description: 'OpenF1 API — Drivers. 1 operations. Lead operation: List drivers for a session. Self-contained Naftiko capability
    covering one Openf1 business surface.'
  tags:
  - Openf1
  - Drivers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENF1_API_KEY: OPENF1_API_KEY
capability:
  consumes:
  - type: http
    namespace: openf1-drivers
    baseUri: https://api.openf1.org/v1
    description: OpenF1 API — Drivers business capability. Self-contained, no shared references.
    resources:
    - name: drivers
      path: /drivers
      operations:
      - name: listdrivers
        method: GET
        description: List drivers for a session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: session_key
          in: query
          type: integer
        - name: meeting_key
          in: query
          type: integer
        - name: driver_number
          in: query
          type: integer
        - name: team_name
          in: query
          type: string
  exposes:
  - type: rest
    namespace: openf1-drivers-rest
    port: 8080
    description: REST adapter for OpenF1 API — Drivers. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/drivers
      name: drivers
      description: REST surface for drivers.
      operations:
      - method: GET
        name: listdrivers
        description: List drivers for a session
        call: openf1-drivers.listdrivers
        with:
          session_key: rest.session_key
          meeting_key: rest.meeting_key
          driver_number: rest.driver_number
          team_name: rest.team_name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openf1-drivers-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenF1 API — Drivers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-drivers-session
      description: List drivers for a session
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openf1-drivers.listdrivers
      with:
        session_key: tools.session_key
        meeting_key: tools.meeting_key
        driver_number: tools.driver_number
        team_name: tools.team_name
      outputParameters:
      - type: object
        mapping: $.
